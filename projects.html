<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f4f4f4" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">

    <style>
        .projects-page {
            max-width: none;
            width: 100%;
            padding-left: 2.5%;
            padding-right: 2.5%;
        }

        .projects-shell {
            display: grid;
            grid-template-columns: minmax(240px, 290px) minmax(0, 1.6fr);
            gap: 2.25rem;
            align-items: start;
        }

        .projects-browser,
        .project-stage {
            background: rgba(255, 255, 255, 0.74);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            overflow: hidden;
        }

        body.dark-mode .projects-browser,
        body.dark-mode .project-stage {
            background: rgba(30, 41, 59, 0.8);
        }

        .browser-topbar,
        .stage-topbar {
            padding: 1rem 1.2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .browser-title,
        .stage-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
        }

        .project-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem;
            color: var(--accent-red);
        }

        .project-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.65rem;
            padding: 1rem 1.2rem;
            border-bottom: 1px solid var(--border-color);
        }

        .filter-chip {
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .filter-chip:hover,
        .filter-chip.active {
            border-color: var(--accent-red);
            color: var(--text-primary);
            background: rgba(227, 53, 13, 0.08);
        }

        .project-list {
            display: flex;
            flex-direction: column;
            max-height: 780px;
            overflow-y: auto;
        }

        .project-list-item {
            border: 0;
            border-bottom: 1px solid rgba(179, 192, 200, 0.35);
            background: transparent;
            text-align: left;
            padding: 1.15rem 1.2rem;
            cursor: pointer;
            transition: background 0.25s ease, border-color 0.25s ease;
        }

        body.dark-mode .project-list-item {
            border-bottom-color: rgba(148, 163, 184, 0.18);
        }

        .project-list-item:hover,
        .project-list-item.active {
            background: rgba(227, 53, 13, 0.06);
        }

        .project-list-item.active {
            box-shadow: inset 3px 0 0 var(--accent-red);
        }

        .project-list-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 0.65rem;
        }

        .project-index,
        .project-status-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .project-index {
            color: var(--accent-red);
        }

        .project-status-badge {
            color: var(--text-secondary);
        }

        .project-list-item h3 {
            margin-bottom: 0.5rem;
            font-size: 1.05rem;
        }

        .project-list-item p {
            font-size: 0.92rem;
            line-height: 1.55;
            margin-bottom: 0;
            max-width: none;
        }

        .project-stage {
            min-height: 780px;
            display: flex;
            flex-direction: column;
        }

        .project-stage-body {
            display: grid;
            grid-template-columns: minmax(430px, 1.05fr) minmax(440px, 1.25fr);
            gap: 0;
            flex: 1;
        }

        .project-visual {
            min-height: 420px;
            border-right: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            background: linear-gradient(145deg, rgba(227, 53, 13, 0.1), rgba(255, 255, 255, 0.05));
        }

        body.dark-mode .project-visual {
            background: linear-gradient(145deg, rgba(255, 75, 43, 0.16), rgba(15, 23, 42, 0.22));
        }

        .project-visual img,
        .project-visual-placeholder {
            width: 100%;
            height: 100%;
            min-height: 420px;
        }

        .project-visual img {
            display: block;
            object-fit: cover;
        }

        .project-visual-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            color: var(--text-secondary);
            background:
                linear-gradient(rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.06)),
                repeating-linear-gradient(135deg, transparent 0 18px, rgba(227, 53, 13, 0.12) 18px 36px);
        }

        .project-visual-overlay {
            position: absolute;
            left: 1.2rem;
            right: 1.2rem;
            bottom: 1.2rem;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            align-items: end;
        }

        .project-phase {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.55rem 0.9rem;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.7);
            color: #f8fafc;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .project-phase::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 16px currentColor;
        }

        .project-phase[data-status="completed"] {
            color: #f97316;
        }

        .project-phase[data-status="building"] {
            color: #facc15;
        }

        .project-phase[data-status="concept"] {
            color: #38bdf8;
        }

        .project-snapshot {
            max-width: 16rem;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.16);
        }

        body.dark-mode .project-snapshot {
            background: rgba(15, 23, 42, 0.88);
            border-color: rgba(148, 163, 184, 0.2);
        }

        .project-snapshot span {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent-red);
            margin-bottom: 0.35rem;
        }

        .project-snapshot p {
            font-size: 0.88rem;
            line-height: 1.55;
            color: var(--text-primary);
            margin-bottom: 0;
            max-width: none;
        }

        .project-detail {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .project-detail-header h2 {
            margin-bottom: 0.7rem;
        }

        .project-detail-header p {
            font-size: 1rem;
            max-width: none;
            margin-bottom: 0;
        }

        .project-detail-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }

        .project-metric {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1rem;
            min-height: 110px;
        }

        .project-metric-label {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.74rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--accent-red);
            margin-bottom: 0.65rem;
        }

        .project-metric-value {
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.55;
        }

        .project-description {
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
        }

        .project-description p {
            max-width: none;
            margin-bottom: 0.95rem;
        }

        .project-tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.55rem;
        }

        .project-tag {
            display: inline-flex;
            align-items: center;
            padding: 0.38rem 0.72rem;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.74rem;
            color: var(--text-secondary);
        }

        .project-live-link {
            display: inline-flex;
            align-items: center;
            padding: 0.6rem 1.2rem;
            border-radius: 999px;
            background: var(--accent-red);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            text-decoration: none;
            letter-spacing: 0.05em;
            transition: opacity 0.2s ease;
            align-self: flex-start;
        }

        .project-live-link:hover {
            opacity: 0.85;
        }

        .project-empty {
            padding: 2rem 1.2rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        @media (max-width: 980px) {
            .projects-shell,
            .project-stage-body {
                grid-template-columns: 1fr;
            }

            .project-visual {
                border-right: 0;
                border-bottom: 1px solid var(--border-color);
            }
        }

        @media (max-width: 640px) {
            .project-detail-grid {
                grid-template-columns: 1fr;
            }

            .project-visual-overlay {
                flex-direction: column;
                align-items: flex-start;
            }

            .project-snapshot {
                max-width: 100%;
            }
        }
    </style>
</head>
